<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="themeToggle">Switch Theme</button>
    <div class="bg">
        <!-- MENU -->
        <div class="menu">
            <div class="dot1"></div>
            <div class="dot2"></div>
            <div class="dot3"></div>
            <div class="dot4"></div>
            <div class="dot5"></div>
            <div class="dot6"></div>
            <div class="dot7"></div>
            <div class="dot8"></div>
            <div class="dot9"></div>
        </div>
        <!-- MIC -->
        <div class="microphone">
            <img class="mic" width="45" src="mic.png">
        </div>
        <!-- ICONS -->
        <div class="dot10">
            <a href="https://www.google.com/maps" target="_blank">
                <img class="map" src="map.png" width="50">
            </a>
        </div>
        <div class="dot11">
            <a href="https://google.com" target="_blank">
                <img src="google.png" class="google" width="50">
            </a>
        </div>
        <div class="dot12">
            <a href="https://google.com/photos" target="_blank">
                <img src="photos.png" class="photos" width="50">
            </a>
        </div>
        <div class="dot13">
            <a href="https://mail.google.com/mail" target="_blank">
                <img src="gmail.png" class="gmail" width="50">
            </a>
        </div>
        <!-- NOTIFICATION -->
        <div class="ntfy">
            <h3 class="ntxt">9+</h3>
        </div>
        <!-- STATUS -->
        <div class="status">
            <!-- TIME -->
            <div class="time">
                <h3 class="ttxt">11:29</h3>
            </div>
            <!-- BATTERY -->
            <div class="battery">
                <img src="battery.png" class="btry" width="20">
            </div>
            <!-- SIGNAL -->
            <div class="signal">
                <img src="signal.png" class="sgnl" width="20">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
